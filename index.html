<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SISCO Email Signature Generator</title>
  <style>
    :root {
      --brand:  #006898;
      --orange: #e38d2d;
      --bg:     #f2f4f8;
      --card:   #ffffff;
      --border: #dde1e9;
      --muted:  #6b7280;
      --radius: 10px;
      --shadow: 0 4px 24px rgba(0,0,0,.10);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Calibri, Arial, sans-serif;
      background: #fff;
      color: #1a1a2e;
      min-height: 100vh;
      padding: 32px 16px;
    }
    h1 {
      text-align: center;
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--brand);
      margin-bottom: 6px;
    }
    .subtitle {
      text-align: center;
      font-size: .88rem;
      color: var(--muted);
      margin-bottom: 32px;
    }
    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 28px;
      max-width: 1100px;
      margin: 0 auto;
    }
    @media (max-width: 820px) { .layout { grid-template-columns: 1fr; } }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 24px;
      box-shadow: var(--shadow);
    }
    .card-title {
      font-size: .78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--brand);
      margin-bottom: 20px;
    }
    .field { margin-bottom: 18px; }
    label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .6px;
    }
    input[type="text"], input[type="tel"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      font-size: .97rem;
      font-family: inherit;
      outline: none;
      background: #fafbfd;
    }
    input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(31,78,121,.10);
    }
    .phone-field {
      display: flex;
      align-items: stretch;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      overflow: hidden;
      background: #fafbfd;
    }
    .phone-field:focus-within {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(31,78,121,.10);
    }
    .phone-prefix {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      font-size: .97rem;
      font-weight: 600;
      color: var(--brand);
      background: #eef2f7;
      border-right: 1.5px solid var(--border);
      white-space: nowrap;
      user-select: none;
    }
    .phone-field input {
      flex: 1;
      border: none;
      border-radius: 0;
      box-shadow: none;
      background: transparent;
    }
    .phone-field input:focus {
      border: none;
      box-shadow: none;
    }
    .btn-row { display: flex; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
    button {
      flex: 1;
      padding: 11px 18px;
      border: none;
      border-radius: 7px;
      font-size: .92rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary { background: var(--brand); color: #fff; }
    .btn-primary:hover { background: #163a5c; }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1.5px solid var(--border);
      flex: none;
      padding: 11px 16px;
    }
    .hint {
      margin-top: 14px;
      font-size: .8rem;
      color: var(--muted);
      line-height: 1.45;
    }
    .toast {
      display: none;
      margin-top: 12px;
      padding: 9px 14px;
      border-radius: 7px;
      font-size: .85rem;
      font-weight: 600;
      text-align: center;
    }
    .toast.ok  { background: #e6f7ee; color: #1a7a40; display: block; }
    .toast.err { background: #fef0f0; color: #b91c1c; display: block; }
    .card-preview {
      background: transparent;
      border: none;
      box-shadow: none;
      padding: 28px 0;
    }
    #preview-wrap {
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0;
      box-shadow: none;
      overflow-x: auto;
    }
    #sig-mount {
      display: inline-block;
      min-width: 520px;
      font-family: Calibri, Arial, Helvetica, sans-serif;
    }
    #asset-preload { position: absolute; width: 0; height: 0; overflow: hidden; }
    #copy-source {
      position: fixed;
      left: -9999px;
      top: 0;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }
    .top-logo {
      position: fixed;
      top: 20px;
      right: 28px;
      height: 44px;
      width: auto;
      z-index: 100;
    }
    @media (max-width: 640px) {
      .top-logo {
        top: 14px;
        right: 14px;
        height: 32px;
      }
    }
  </style>
</head>
<body>

<img class="top-logo" id="header-logo" src="" alt="SISCO" />
<h1>SISCO Email Signature Generator</h1>
<p class="subtitle">Matches the Email Signature template — copy and paste directly into Outlook.</p>

<div class="layout">
  <div class="card">
    <div class="card-title">Your Details</div>

    <div class="field">
      <label for="f-name">Name</label>
      <input type="text" id="f-name" placeholder="e.g. Your full name" autocomplete="name" />
    </div>
    <div class="field">
      <label for="f-position">Position</label>
      <input type="text" id="f-position" placeholder="e.g. Senior Engineer" />
    </div>
    <div class="field">
      <label for="f-tel">Telephone</label>
      <div class="phone-field">
        <span class="phone-prefix">+966</span>
        <input type="text" id="f-tel" placeholder="131234567" inputmode="numeric" pattern="[0-9]*" autocomplete="tel" />
      </div>
    </div>
    <div class="field">
      <label for="f-mobile">Mobile</label>
      <div class="phone-field">
        <span class="phone-prefix">+966</span>
        <input type="text" id="f-mobile" placeholder="501234567" inputmode="numeric" pattern="[0-9]*" autocomplete="tel" />
      </div>
    </div>

    <div class="btn-row">
      <button class="btn-primary" id="btn-copy" type="button">Copy for Outlook</button>
      <button class="btn-ghost" id="btn-clear" type="button" title="Clear">Clear</button>
    </div>
    <p class="hint">
      In Outlook: <strong>File → Options → Mail → Signatures</strong> → New → <strong>Ctrl+V</strong>.
    </p>
    <div id="toast" class="toast"></div>
  </div>

  <div class="card card-preview">
    <div class="card-title">Live Preview</div>
    <div id="preview-wrap">
      <div id="sig-mount"></div>
    </div>
  </div>
</div>

<div id="asset-preload" aria-hidden="true">
  <img id="preload-logo" src="" alt="" />
  <img id="preload-certs" src="" alt="" />
</div>
<div id="copy-source" aria-hidden="true"></div>

<script src="signature-assets/images.js"></script>
<script>
(function () {
  'use strict';

  const BLUE   = '#006898';
  const ORANGE = '#e38d2d';
  const FONT   = 'Calibri,Arial,Helvetica,sans-serif';
  const NAME_SIZE   = '11pt';
  const TITLE_SIZE  = '11pt';
  const BODY_SIZE   = '9pt';
  const LOGO_W = 109;
  const LOGO_H = 67;
  const CERT_W = 85;
  const CERT_H = 20;
  const LOGO_SOURCES = [
    window.SIG_ASSETS && window.SIG_ASSETS.logo,
    'signature-assets/sisco-logo.png',
    'https://i.imghippo.com/files/JZ3827XsQ.png',
  ].filter(Boolean);
  const CERTS_FILE = (window.SIG_ASSETS && window.SIG_ASSETS.certs) || 'signature-assets/certs.png';
  let logoSourceIndex = 0;
  let logoFile = LOGO_SOURCES[0] || '';
  const PHONE_CC   = '+966';

  let logoDataUrl  = null;
  let certsDataUrl = null;

  const fields = {
    name:     document.getElementById('f-name'),
    position: document.getElementById('f-position'),
    tel:      document.getElementById('f-tel'),
    mobile:   document.getElementById('f-mobile'),
  };

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function digitsOnly(raw) {
    return String(raw).replace(/\D/g, '');
  }

  function stripCountryCode(raw) {
    return digitsOnly(String(raw).replace(/^\s*\+966\s*/i, ''));
  }

  function formatPhone(raw) {
    const local = stripCountryCode(raw);
    return local ? (PHONE_CC + ' ' + local) : PHONE_CC;
  }

  function bindDigitsOnly(el) {
    el.addEventListener('input', function () {
      const cleaned = digitsOnly(this.value);
      if (this.value !== cleaned) this.value = cleaned;
    });
    el.addEventListener('paste', function (e) {
      e.preventDefault();
      const pasted = (e.clipboardData || window.clipboardData).getData('text');
      this.value = digitsOnly(this.value + pasted);
      update();
    });
  }

  function capitalizeWords(raw) {
    return String(raw).trim().replace(/(^|[\s-])(\S)/g, function (_, sep, letter) {
      return sep + letter.toUpperCase();
    });
  }

  function bindTitleCase(el) {
    el.addEventListener('blur', function () {
      const formatted = capitalizeWords(this.value);
      if (this.value !== formatted) this.value = formatted;
      update();
    });
  }

  function getValues() {
    const name     = capitalizeWords(fields.name.value);
    const position = capitalizeWords(fields.position.value);
    return {
      name:     name     || 'Your Name',
      position: position || 'Your Position',
      tel:      formatPhone(fields.tel.value),
      mobile:   formatPhone(fields.mobile.value),
    };
  }

  function imgToDataUrl(img) {
    const c = document.createElement('canvas');
    c.width  = img.naturalWidth  || LOGO_W;
    c.height = img.naturalHeight || LOGO_H;
    c.getContext('2d').drawImage(img, 0, 0);
    return c.toDataURL('image/png');
  }

  function logoSrc(forCopy) {
    return (forCopy && logoDataUrl) ? logoDataUrl : logoFile;
  }

  function certsSrc(forCopy) {
    return (forCopy && certsDataUrl) ? certsDataUrl : CERTS_FILE;
  }

  function buildSignatureHtml(v, forCopy) {
    const telLine    = esc(v.tel)    || '&nbsp;';
    const mobileLine = esc(v.mobile) || '&nbsp;';

    const textBase = 'font-family:' + FONT + ';font-weight:normal;font-style:normal;color:' + BLUE + ';';

    return [
      '<table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;' + textBase + '">',
      '  <tr><td style="' + textBase + 'font-size:' + NAME_SIZE + ';line-height:20pt;mso-line-height-rule:exactly;padding:0 0 2px 0;">' + esc(v.name) + '</td></tr>',
      '  <tr><td style="' + textBase + 'font-size:' + TITLE_SIZE + ';line-height:20pt;mso-line-height-rule:exactly;padding:0 0 8px 0;">' + esc(v.position) + '</td></tr>',
      '  <tr><td style="padding:0 0 10px 0;">',
      '    <table cellpadding="0" cellspacing="0" border="0" width="450" style="border-collapse:collapse;">',
      '      <tr><td style="border-bottom:1px solid ' + BLUE + ';font-size:0;line-height:0;">&nbsp;</td></tr>',
      '    </table>',
      '  </td></tr>',
      '  <tr><td>',
      '    <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">',
      '      <tr>',
      '        <td valign="middle" style="padding:0 14px 0 0;">',
      '          <img src="' + logoSrc(forCopy) + '" width="' + LOGO_W + '" height="' + LOGO_H + '" alt="SISCO" style="display:block;border:0;width:' + LOGO_W + 'px;height:' + LOGO_H + 'px;" />',
      '        </td>',
      '        <td valign="top" style="border-left:2px solid ' + ORANGE + ';padding:2px 18px 0 14px;">',
      '          <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;' + textBase + 'font-size:' + BODY_SIZE + ';line-height:' + BODY_SIZE + ';mso-line-height-rule:exactly;">',
      '            <tr><td style="padding:0;margin:0;line-height:' + BODY_SIZE + ';mso-line-height-rule:exactly;">Telephone:&nbsp;' + telLine + '</td></tr>',
      '            <tr><td style="padding:0;margin:0;line-height:' + BODY_SIZE + ';mso-line-height-rule:exactly;">Mobile:&nbsp;' + mobileLine + '</td></tr>',
      '            <tr><td style="padding:0 0 4px 0;"><a href="https://www.siscosaudi.com" style="font-family:' + FONT + ';font-size:' + BODY_SIZE + ';color:' + BLUE + ';text-decoration:underline;">www.siscosaudi.com</a></td></tr>',
      '            <tr><td style="padding:0;">King Faisal, Ibn Abdul Al-Aziz,<br />Al-Bahar, Al Khobar 34218, Saudi Arabia</td></tr>',
      '          </table>',
        '        </td>',
      '        <td valign="bottom" style="padding:0 0 4px 6px;">',
      '          <img src="' + certsSrc(forCopy) + '" width="' + CERT_W + '" height="' + CERT_H + '" alt="Certifications" style="display:block;border:0;width:' + CERT_W + 'px;height:' + CERT_H + 'px;" />',
      '        </td>',
      '      </tr>',
      '    </table>',
      '  </td></tr>',
      '</table>'
    ].join('\n');
  }

  function update() {
    document.getElementById('sig-mount').innerHTML = buildSignatureHtml(getValues(), false);
  }

  function wrapCfHtml(fragment) {
    const start = '<!--StartFragment-->';
    const end   = '<!--EndFragment-->';
    const htmlBody = '<html><body>' + start + fragment + end + '</body></html>';
    const placeholder =
      'Version:0.9\r\n' +
      'StartHTML:0000000000\r\nEndHTML:0000000000\r\n' +
      'StartFragment:0000000000\r\nEndFragment:0000000000\r\n';
    const full = placeholder + htmlBody;
    const startHtml = placeholder.length;
    const startFrag = full.indexOf(start) + start.length;
    const endFrag   = full.indexOf(end);
    const endHtml   = full.length;
    const header =
      'Version:0.9\r\n' +
      'StartHTML:'     + String(startHtml).padStart(10, '0') + '\r\n' +
      'EndHTML:'       + String(endHtml).padStart(10, '0') + '\r\n' +
      'StartFragment:' + String(startFrag).padStart(10, '0') + '\r\n' +
      'EndFragment:'   + String(endFrag).padStart(10, '0') + '\r\n';
    return header + htmlBody;
  }

  async function copySignature() {
    const v = getValues();
    const html = buildSignatureHtml(v, true);
    const plain = [
      v.name, v.position, '',
      'Telephone: ' + (v.tel || ''),
      'Mobile:  ' + (v.mobile || ''),
      'www.siscosaudi.com',
      'King Faisal, Ibn Abdul Al-Aziz, Al-Bahar, Al Khobar 34218, Saudi Arabia'
    ].join('\r\n');

    try {
      const src = document.getElementById('copy-source');
      src.innerHTML = html;
      const range = document.createRange();
      range.selectNodeContents(src);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
      if (document.execCommand('copy')) {
        sel.removeAllRanges();
        toast('Copied! Paste into Outlook Signatures with Ctrl+V.', 'ok');
        return;
      }
      sel.removeAllRanges();
    } catch (_) { /* fall through */ }

    try {
      if (navigator.clipboard && window.ClipboardItem) {
        const cfHtml = wrapCfHtml(html);
        await navigator.clipboard.write([
          new ClipboardItem({
            'text/html':  new Blob([cfHtml], { type: 'text/html' }),
            'text/plain': new Blob([plain],  { type: 'text/plain' }),
          }),
        ]);
        toast('Copied! Paste into Outlook Signatures with Ctrl+V.', 'ok');
        return;
      }
    } catch (_) { /* fall through */ }

    toast('Copy failed. Click inside the preview, press Ctrl+A then Ctrl+C.', 'err');
  }

  function clearForm() {
    Object.values(fields).forEach(function (el) { el.value = ''; });
    update();
    toast('Form cleared.', 'ok');
  }

  function syncHeaderLogo() {
    const headerLogo = document.getElementById('header-logo');
    if (headerLogo && logoFile) headerLogo.src = logoFile;
  }

  function toast(msg, type) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast ' + type;
    clearTimeout(el._timer);
    el._timer = setTimeout(function () { el.className = 'toast'; }, 4000);
  }

  function preloadAssets() {
    const logoEl  = document.getElementById('preload-logo');
    const certsEl = document.getElementById('preload-certs');

    function onLogoReady() {
      if (logoFile.indexOf('data:') === 0) {
        logoDataUrl = logoFile;
      } else {
        try { logoDataUrl = imgToDataUrl(logoEl); } catch (_) {}
      }
      syncHeaderLogo();
      update();
    }

    function onCertsReady() {
      if (CERTS_FILE.indexOf('data:') === 0) {
        certsDataUrl = CERTS_FILE;
      } else {
        try { certsDataUrl = imgToDataUrl(certsEl); } catch (_) {}
      }
      update();
    }

    function loadLogoSource() {
      if (logoSourceIndex >= LOGO_SOURCES.length) {
        update();
        return;
      }
      logoFile = LOGO_SOURCES[logoSourceIndex++];
      if (logoFile.indexOf('data:') === 0) {
        logoDataUrl = logoFile;
        syncHeaderLogo();
        update();
        return;
      }
      logoEl.src = logoFile;
      if (logoEl.complete && logoEl.naturalWidth) onLogoReady();
    }

    logoEl.addEventListener('load', onLogoReady);
    logoEl.addEventListener('error', loadLogoSource);

    if (CERTS_FILE.indexOf('data:') === 0) {
      certsDataUrl = CERTS_FILE;
    } else {
      certsEl.src = CERTS_FILE;
      if (certsEl.complete && certsEl.naturalWidth) onCertsReady();
      else certsEl.addEventListener('load', onCertsReady);
      certsEl.addEventListener('error', update);
    }

    loadLogoSource();
  }

  bindTitleCase(fields.name);
  bindTitleCase(fields.position);
  bindDigitsOnly(fields.tel);
  bindDigitsOnly(fields.mobile);
  Object.values(fields).forEach(function (el) {
    el.addEventListener('input', update);
  });
  document.getElementById('btn-copy').addEventListener('click', copySignature);
  document.getElementById('btn-clear').addEventListener('click', clearForm);

  update();
  preloadAssets();
})();
</script>
</body>
</html>
